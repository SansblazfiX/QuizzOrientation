<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devine la Filière · Lycée Albert Camus</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf8f2;
    --dark: #1a1a2e;
    --card-bg: #ffffff;
    --muted: #8a8a9a;
    --border: #ece8e0;
    --green: #4caf82;
    --red: #e85a5a;
    --radius: 20px;
    --c1: #e8735a; /* ASSP */
    --c2: #5ab4e8; /* AEPE */
    --c3: #a78bfa; /* HPS */
    --c4: #f59e42; /* Cuisine */
    --c5: #34d399; /* PSR */
    --c6: #f472b6; /* CSHCR */
    --c7: #60a5fa; /* AGORA */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--dark);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(167,139,250,0.08), transparent 70%);
    top: -150px; right: -120px;
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(244,114,182,0.07), transparent 70%);
    bottom: -100px; left: -80px;
    pointer-events: none; z-index: 0;
  }
  .wrapper { position: relative; z-index: 1; width: 100%; max-width: 640px; }

  /* HEADER */
  header { text-align: center; margin-bottom: 26px; }
  .school-badge {
    display: inline-block;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 5px 16px;
    margin-bottom: 12px;
  }
  h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 5vw, 2.3rem); font-weight: 900; line-height: 1.2; }
  .subtitle { margin-top: 8px; font-size: 13px; color: var(--muted); }

  /* SCOREBAR */
  .scorebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 12px;
  }
  .score-box { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; }
  .score-num { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900; }
  .progress-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .steps { display: flex; gap: 5px; width: 100%; }
  .step-dot { flex: 1; height: 5px; border-radius: 99px; background: var(--border); transition: background .4s; }
  .step-dot.correct { background: var(--green); }
  .step-dot.wrong { background: var(--red); }
  .step-dot.active { background: linear-gradient(90deg, #a78bfa, #f472b6); }
  .step-count { font-size: 11px; color: var(--muted); font-weight: 600; }

  /* CARD */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 30px;
    box-shadow: 0 4px 30px rgba(0,0,0,.07), 0 1px 4px rgba(0,0,0,.04);
    animation: rise .35s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(16px) scale(.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* PORTRAIT */
  .portrait-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: 10px; }
  .portrait-card {
    background: var(--bg);
    border-radius: 14px;
    padding: 18px 20px;
    border-left: 4px solid var(--border);
    margin-bottom: 20px;
    transition: border-color .35s, background .35s;
  }
  .portrait-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; }
  .portrait-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .ptag { background: #fff; border: 1.5px solid var(--border); border-radius: 999px; font-size: 11px; font-weight: 700; padding: 3px 10px; color: var(--muted); }
  .portrait-text { font-size: 13.5px; line-height: 1.75; color: #3a3a5a; }

  /* QUESTION */
  .q-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: 7px; }
  .q-text { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; line-height: 1.4; margin-bottom: 16px; }

  /* OPTIONS GRID */
  .options {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 9px;
  }
  .option {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 13px;
    padding: 13px 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--dark);
    cursor: pointer;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: all .18s ease;
    line-height: 1.3;
  }
  .option:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.08); border-color: #c0b8b0; }
  .option .opt-emoji { font-size: 22px; }
  .option:disabled { cursor: not-allowed; }
  .option.correct { border-color: var(--green); background: rgba(76,175,130,.1); color: #2a7a55; }
  .option.wrong   { border-color: var(--red); background: rgba(232,90,90,.08); color: #a03030; opacity: .65; }
  /* per-filière hover colors applied via inline style on revealed */

  /* FEEDBACK */
  .feedback { margin-top: 14px; border-radius: 12px; padding: 13px 16px; font-size: 13px; font-weight: 600; line-height: 1.65; display: none; }
  .feedback.show { display: block; animation: rise .3s ease forwards; }
  .feedback.fb-correct { background: rgba(76,175,130,.1); color: #2a7a55; border: 1.5px solid rgba(76,175,130,.3); }
  .feedback.fb-wrong   { background: rgba(232,90,90,.08); color: #a03030; border: 1.5px solid rgba(232,90,90,.25); }

  /* NEXT */
  .btn-next { margin-top: 16px; width: 100%; padding: 14px; border: none; border-radius: 14px; background: var(--dark); color: #fff; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all .2s; display: none; }
  .btn-next.show { display: block; animation: rise .3s ease forwards; }
  .btn-next:hover { background: #2d2d4a; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,26,46,.2); }

  /* RESULT */
  #result { display: none; }
  #result.show { display: block; animation: rise .4s cubic-bezier(.22,1,.36,1) forwards; }
  .result-top { text-align: center; padding-bottom: 22px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .big-score { font-family: 'Playfair Display', serif; font-size: 4rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
  .score-sub { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
  .verdict { display: inline-block; padding: 8px 22px; border-radius: 999px; font-weight: 700; font-size: 13px; }
  .verdict-great { background: rgba(76,175,130,.15); color: #2a7a55; }
  .verdict-ok    { background: rgba(232,180,50,.15); color: #8a6010; }
  .verdict-retry { background: rgba(232,90,90,.12); color: #a03030; }
  .result-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 900; margin: 16px 0 6px; }
  .result-desc { font-size: 13.5px; color: var(--muted); line-height: 1.7; }
  .recap { margin: 18px 0; display: flex; flex-direction: column; gap: 8px; }
  .recap-item { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; padding: 10px 14px; border-radius: 10px; background: var(--bg); border: 1.5px solid var(--border); }
  .recap-item.rc { border-color: rgba(76,175,130,.35); }
  .recap-item.rw { border-color: rgba(232,90,90,.3); }
  .recap-dot { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
  .recap-text { line-height: 1.5; }
  .recap-text strong { font-weight: 700; color: var(--dark); }
  .btn-restart { width: 100%; padding: 13px; border: 2px solid var(--border); border-radius: 14px; background: transparent; color: var(--muted); font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s; margin-top: 4px; }
  .btn-restart:hover { border-color: var(--dark); color: var(--dark); }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="school-badge">🏫 Lycée Albert Camus · Firminy</div>
    <h1>Devine la filière<br>de cet élève !</h1>
    <p class="subtitle">7 portraits, 7 filières à deviner — sauras-tu les reconnaître ?</p>
  </header>

  <div id="quiz">
    <div class="scorebar">
      <div class="score-box">
        <span style="color:var(--green)">✓</span>
        <span class="score-num" id="score-good" style="color:var(--green)">0</span>
      </div>
      <div class="progress-col">
        <div class="steps" id="steps-bar"></div>
        <span class="step-count" id="step-count">Portrait 1 / 7</span>
      </div>
      <div class="score-box">
        <span class="score-num" id="score-bad" style="color:var(--red)">0</span>
        <span style="color:var(--red)">✗</span>
      </div>
    </div>

    <div class="card" id="q-card">
      <div class="portrait-label">👤 Portrait de l'élève</div>
      <div class="portrait-card" id="portrait-card">
        <div class="portrait-name" id="p-name"></div>
        <div class="portrait-tags" id="p-tags"></div>
        <div class="portrait-text" id="p-text"></div>
      </div>
      <div class="q-label">🎯 Ta réponse</div>
      <div class="q-text">Quelle filière correspond le mieux à cet élève ?</div>
      <div class="options" id="q-options"></div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="btn-next" onclick="nextQ()">Portrait suivant →</button>
    </div>
  </div>

  <div id="result">
    <div class="card">
      <div class="result-top">
        <div class="big-score" id="res-score"></div>
        <div class="score-sub">Bonnes réponses sur 7 portraits</div>
        <div class="verdict" id="res-verdict"></div>
      </div>
      <div class="result-title">Récapitulatif</div>
      <div class="result-desc" id="res-desc"></div>
      <div class="recap" id="recap-list"></div>
      <button class="btn-restart" onclick="restart()">↺ Rejouer</button>
    </div>
  </div>
</div>

<script>
const filieres = {
  assp:   { label: "Bac Pro ASSP",  emoji: "🏥", color: "#e8735a",
            desc: "Formation en 3 ans qui prépare à accompagner des personnes âgées ou handicapées dans les gestes du quotidien (toilette, repas, déplacements), en EHPAD, clinique ou à domicile. Ouvre vers le diplôme d'aide-soignant." },
  aepe:   { label: "CAP AEPE",      emoji: "🧸", color: "#5ab4e8",
            desc: "Formation en 2 ans centrée sur l'accueil et l'éveil des enfants de 0 à 6 ans en crèche, halte-garderie ou école maternelle. Idéale pour devenir ATSEM ou auxiliaire de puériculture." },
  hps:    { label: "Bac Pro HPS",   emoji: "💉", color: "#a78bfa",
            desc: "Formation en 3 ans spécialisée dans la propreté, la désinfection et la stérilisation en milieux sensibles : hôpitaux, laboratoires, industries pharmaceutiques ou agroalimentaires." },
  cuisine:{ label: "CAP Cuisine",   emoji: "👨‍🍳", color: "#f59e42",
            desc: "Formation en 2 ans aux techniques culinaires professionnelles : découpes, sauces, cuissons, dressage. Prépare au métier de commis cuisinier en restaurant traditionnel ou gastronomique." },
  psr:    { label: "CAP PSR",       emoji: "🍱", color: "#34d399",
            desc: "Formation en 2 ans orientée restauration rapide et collective : cantines scolaires, restaurants d'entreprise, hôpitaux. Prépare des repas simples, assure le service et entretient les espaces." },
  cshcr:  { label: "CAP CSHCR",    emoji: "🛎️", color: "#f472b6",
            desc: "Formation en 2 ans polyvalente couvrant le service en salle, l'accueil client et les bases de l'hôtellerie. Idéale pour travailler en restaurant, hôtel, brasserie ou dans l'hôtellerie internationale." },
  agora:  { label: "Bac Pro AGORA", emoji: "💻", color: "#60a5fa",
            desc: "Formation en 3 ans aux métiers administratifs : gestion de dossiers, rédaction de courriers, accueil, suivi RH et facturation. Débouche sur des postes en PME, collectivités ou associations." },
};

const questions = [
  {
    name: "Léa, 16 ans",
    tags: ["Aime les bébés", "Créative", "Patiente"],
    text: "Léa adore passer du temps avec ses petits cousins et leur inventer des jeux et des histoires. Elle veut travailler dans un endroit coloré et vivant, entourée de rires. Elle s'intéresse au développement du nourrisson et rêve de devenir ATSEM un jour.",
    answer: "aepe",
    explanation: "Léa veut travailler avec les tout-petits et devenir ATSEM → CAP AEPE, formation axée sur l'accompagnement éducatif 0-6 ans."
  },
  {
    name: "Tom, 15 ans",
    tags: ["Empathique", "Calme", "Attentionné"],
    text: "Tom aide régulièrement sa grand-mère dépendante lors des repas. Il veut apprendre les gestes de soin, surveiller l'état de santé des personnes âgées et travailler en EHPAD. Il envisage ensuite le diplôme d'aide-soignant.",
    answer: "assp",
    explanation: "Soin aux personnes âgées, travail en EHPAD, projet d'aide-soignant → Bac Pro ASSP, la formation faite pour lui."
  },
  {
    name: "Yasmine, 16 ans",
    tags: ["Rigoureuse", "Discrète", "Organisée"],
    text: "Yasmine est fascinée par la propreté des espaces hospitaliers. Elle aimerait travailler dans un laboratoire pharmaceutique ou un bloc opératoire pour assurer la stérilisation du matériel. Elle est très à l'aise avec les protocoles et les règles d'hygiène strictes.",
    answer: "hps",
    explanation: "Stérilisation, laboratoires, protocoles d'hygiène stricte → Bac Pro HPS, la seule formation qui couvre ces métiers."
  },
  {
    name: "Antoine, 15 ans",
    tags: ["Passionné", "Créatif", "Perfectionniste"],
    text: "Antoine regarde tous les émissions culinaires et essaie de reproduire les recettes chez lui. Il maîtrise déjà les bases des couteaux et rêve de travailler en cuisine gastronomique. Il veut apprendre les vraies techniques culinaires auprès de professionnels.",
    answer: "cuisine",
    explanation: "Techniques culinaires, cuisine gastronomique, passion de la cuisine → CAP Cuisine, le point de départ idéal."
  },
  {
    name: "Rania, 16 ans",
    tags: ["Rapide", "Sociable", "Efficace"],
    text: "Rania veut travailler vite et bien. Elle se voit dans une cantine scolaire ou un restaurant d'entreprise, à préparer et servir des repas chaque jour. Elle aime le contact avec le public mais préfère un cadre structuré et des tâches répétitives et maîtrisées.",
    answer: "psr",
    explanation: "Restauration collective, cantine, service rapide et cadre structuré → CAP PSR, la formation faite pour ce profil."
  },
  {
    name: "Lucas, 17 ans",
    tags: ["Présentable", "Polyglotte", "À l'aise"],
    text: "Lucas adore l'ambiance des hôtels et restaurants. Il se voit accueillir des clients, dresser une belle table et assurer un service impeccable en salle. Il parle anglais couramment et rêve de travailler dans l'hôtellerie internationale.",
    answer: "cshcr",
    explanation: "Service en salle, hôtellerie, accueil client et international → CAP CSHCR, formation idéale pour ce profil."
  },
  {
    name: "Camille, 16 ans",
    tags: ["Organisée", "À l'aise avec les chiffres", "Souriante"],
    text: "Camille adore classer, organiser et gérer les papiers administratifs. Elle se voit dans une PME ou une mairie à gérer des dossiers, rédiger des courriers et accueillir du public. Elle n'aime pas le travail manuel mais apprécie la polyvalence du bureau.",
    answer: "agora",
    explanation: "Gestion administrative, PME, mairie, rédaction de courriers → Bac Pro AGORA, formation aux métiers du secrétariat et de la gestion."
  }
];

// Shuffle questions order each game
function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

let order = [];
let current = 0, correct = 0, wrong = 0, answered = false, history = [];

function buildSteps() {
  const bar = document.getElementById('steps-bar');
  bar.innerHTML = '';
  order.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'step-dot' + (i < history.length ? (history[i] ? ' correct' : ' wrong') : i === current ? ' active' : '');
    bar.appendChild(d);
  });
}

function renderQuestion() {
  answered = false;
  const q = order[current];
  document.getElementById('step-count').textContent = `Portrait ${current + 1} / 7`;
  document.getElementById('score-good').textContent = correct;
  document.getElementById('score-bad').textContent = wrong;

  // Portrait
  document.getElementById('p-name').textContent = q.name;
  document.getElementById('p-tags').innerHTML = q.tags.map(t => `<span class="ptag">${t}</span>`).join('');
  document.getElementById('p-text').textContent = q.text;
  document.getElementById('portrait-card').style.borderLeftColor = '#ece8e0';
  document.getElementById('portrait-card').style.background = '';

  // Build options (all 7 filières, shuffled)
  const opts = document.getElementById('q-options');
  opts.innerHTML = '';
  const fKeys = shuffle(Object.keys(filieres));
  fKeys.forEach(key => {
    const f = filieres[key];
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.id = `opt-${key}`;
    btn.innerHTML = `<span class="opt-emoji">${f.emoji}</span><span>${f.label}</span>`;
    btn.onclick = () => answer(key);
    opts.appendChild(btn);
  });

  // Feedback & next reset
  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.textContent = '';
  const btn = document.getElementById('btn-next');
  btn.className = 'btn-next';
  btn.textContent = current === order.length - 1 ? 'Voir mon score →' : 'Portrait suivant →';

  buildSteps();
  const card = document.getElementById('q-card');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = '';
}

function answer(val) {
  if (answered) return;
  answered = true;
  const q = order[current];
  const ok = val === q.answer;
  if (ok) correct++; else wrong++;
  history.push(ok);

  // Disable all options, highlight correct + wrong
  Object.keys(filieres).forEach(key => {
    const b = document.getElementById(`opt-${key}`);
    if (!b) return;
    b.disabled = true;
    if (key === q.answer) b.classList.add('correct');
    else if (key === val && !ok) b.classList.add('wrong');
  });

  // Portrait color reveal
  const pc = document.getElementById('portrait-card');
  pc.style.borderLeftColor = filieres[q.answer].color;
  pc.style.background = filieres[q.answer].color + '10';

  // Feedback
  const fb = document.getElementById('feedback');
  fb.className = `feedback show ${ok ? 'fb-correct' : 'fb-wrong'}`;
  if (ok) {
    fb.innerHTML = `✅ <strong>Bonne réponse !</strong> — ${q.explanation}`;
  } else {
    const correct_f = filieres[q.answer];
    const wrong_f = filieres[val];
    fb.innerHTML = `❌ <strong>Raté !</strong> La bonne réponse était <strong style="color:${correct_f.color}">${correct_f.emoji} ${correct_f.label}</strong> — ${q.explanation}<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(232,90,90,0.2)"><span style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;opacity:.7">Tu as répondu :</span><br><strong style="color:${wrong_f.color}">${wrong_f.emoji} ${wrong_f.label}</strong> — ${wrong_f.desc}</div>`;
  }

  document.getElementById('btn-next').classList.add('show');
  document.getElementById('score-good').textContent = correct;
  document.getElementById('score-bad').textContent = wrong;
  buildSteps();
}

function nextQ() {
  current++;
  if (current >= order.length) showResult(); else renderQuestion();
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').classList.add('show');
  document.getElementById('res-score').textContent = `${correct} / 7`;

  let vc, vt, dt;
  if (correct >= 6)      { vc='verdict-great'; vt='🏆 Expert(e) en orientation !'; dt="Impressionnant ! Tu connais parfaitement toutes les filières du lycée Albert Camus. Tu serais un(e) excellent(e) conseiller(ère) d'orientation !"; }
  else if (correct >= 4) { vc='verdict-ok';    vt='👍 Pas mal du tout !'; dt="Tu as bien cerné la plupart des filières. Quelques portraits t'ont piégé(e), mais l'essentiel est là !"; }
  else                   { vc='verdict-retry'; vt='📚 À réviser !'; dt="Ces filières se ressemblent parfois... Relis les portraits et les explications pour mieux cerner chaque formation !"; }

  document.getElementById('res-verdict').textContent = vt;
  document.getElementById('res-verdict').className = `verdict ${vc}`;
  document.getElementById('res-desc').textContent = dt;

  const recap = document.getElementById('recap-list');
  recap.innerHTML = '';
  order.forEach((q, i) => {
    const ok = history[i];
    const f = filieres[q.answer];
    recap.innerHTML += `
      <div class="recap-item ${ok?'rc':'rw'}">
        <span class="recap-dot">${ok?'✅':'❌'}</span>
        <div class="recap-text">
          <strong>${q.name}</strong> → <span style="font-weight:700;color:${f.color}">${f.emoji} ${f.label}</span>
          ${!ok ? `<br><span style="font-size:12px;color:#a03030">${q.explanation}</span>` : ''}
        </div>
      </div>`;
  });
}

function restart() {
  current=0; correct=0; wrong=0; answered=false; history=[];
  order = shuffle([...questions]);
  document.getElementById('result').classList.remove('show');
  document.getElementById('result').style.display='';
  document.getElementById('quiz').style.display='';
  renderQuestion();
}

order = shuffle([...questions]);
renderQuestion();
</script>
</body>
</html>
